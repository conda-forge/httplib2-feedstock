{% set name = "httplib2" %}
{% set version = "0.31.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/httplib2-{{ version }}.tar.gz
  sha256: 21591655ac54953624c6ab8d587c71675e379e31e2cfe3147c83c11e9ef41f92

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=40.8.0
  run:
    - python >={{ python_min }}
    - pyparsing >=3.0.4,<4

test:
  imports:
    - httplib2
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/httplib2/httplib2
  license: MIT
  license_file: LICENSE
  summary: A comprehensive HTTP client library

extra:
  recipe-maintainers:
    - ocefpaf
    - sigmavirus24
